[tool.pytest.ini_options]
markers = [
    "integration: requires FFmpeg, test video, or MediaPipe models",
]

[tool.black]
line-length = 88
exclude = '''
/(
    docs
)/
'''

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203"]
per-file-ignores = ["app/*:E501,W291,W293"]
exclude = ["docs"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
plugins = ["pydantic.mypy"]
exclude = ["docs/"]

[[tool.mypy.overrides]]
module = "mediapipe.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "cv2.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "streamlit.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "yaml"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "torch"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "torch.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "rtmlib.*"
ignore_missing_imports = true
